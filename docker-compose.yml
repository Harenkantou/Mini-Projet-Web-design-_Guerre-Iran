services:
  # Service MySQL
  db:
    image: mysql:8.0
    container_name: mini_projet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_projet
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/base.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      timeout: 5s
      retries: 5
      start_period: 60s

  # Service Apache + PHP (support .htaccess)
  web:
    build:
      context: .
      dockerfile: Dockerfile.php
    image: my-php-app:8.2-apache
    container_name: mini_projet_web
    ports:
      - "8000:80"
    volumes:
      - ./tinymce:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # Service Adminer (gestion de la base de données)
  adminer:
    image: adminer:latest
    container_name: mini_projet_adminer
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  mysql_data:
