server {
    listen 80;
    server_name localhost;
    root /app;

    # Fichiers statiques et index
    index index.html index.php index.htm;

    # Configuration pour les fichiers statiques (TinyMCE et assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|d\.ts|min\.js|min\.css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Services les fichiers HTML directement
    location ~* \.html?$ {
        try_files $uri =404;
    }

    # Route principale (catch-all)
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Configuration PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Forbidden access to sensitive files
    location ~ /\.ht {
        deny all;
    }
}
